name: Deploy to Fasthosts

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftp.fasthosts.co.uk
          username: roundwoodsolutions.co.uk
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: /htdocs/
          security: loose
          timeout: 60000
          dangerous-clean-slate: false
          exclude: |
            **/node_modules/**
            **/.DS_Store
            **/.well-known/**
            **/*.yml
            **/README.md
